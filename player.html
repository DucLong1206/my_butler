<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Player</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #020617;
        color: #e2e8f0;
        font-family: Inter, system-ui, sans-serif;
      }

      .player-shell {
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 100%;
      }

      .player-header,
      .player-error {
        padding: 12px 16px;
        background: rgba(15, 23, 42, 0.95);
        font-size: 14px;
      }

      .player-error {
        color: #fca5a5;
      }

      #player {
        flex: 1;
        width: 100%;
        height: 100%;
        border: 0;
      }
    </style>
  </head>
  <body>
    <div class="player-shell">
      <div class="player-header" id="playerTitle">Đang tải video...</div>
      <div class="player-error" id="playerError" hidden></div>
      <iframe
        id="player"
        type="text/html"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        allowfullscreen
        referrerpolicy="strict-origin-when-cross-origin"
      ></iframe>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const videoId = params.get("videoId");
      const title = params.get("title") || "YouTube Player";
      const origin = params.get("origin") || window.location.origin;
      const playerTitle = document.getElementById("playerTitle");
      const playerError = document.getElementById("playerError");
      const iframe = document.getElementById("player");
      playerTitle.textContent = title;
      document.title = title;

      let player;

      function postStatus(message) {
        if (window.opener && !window.opener.closed) {
          window.opener.postMessage({ type: "PLAYER_STATUS", message }, window.location.origin);
        }
      }

      function showError(message) {
        playerError.hidden = false;
        playerError.textContent = message;
        postStatus(message);
      }

      function applySize(width, height) {
        window.resizeTo(Math.max(width, 640), Math.max(height, 480));
      }

      iframe.src = `https://www.youtube.com/embed/${videoId}?enablejsapi=1&autoplay=1&playsinline=1&rel=0&origin=${encodeURIComponent(origin)}`;

      function onYouTubeIframeAPIReady() {
        player = new YT.Player("player", {
          events: {
            onReady: () => {
              postStatus(`Player đã sẵn sàng cho video ${title}.`);
            },
            onError: (event) => {
              if (event.data === 153) {
                showError("YouTube báo lỗi 153: thiếu HTTP Referer hoặc origin hợp lệ. Hãy mở app qua http://localhost thay vì file://.");
                return;
              }

              showError(`Player gặp lỗi YouTube: ${event.data}.`);
            },
          },
        });
      }

      window.onYouTubeIframeAPIReady = onYouTubeIframeAPIReady;

      window.addEventListener("message", async (event) => {
        if (event.origin !== window.location.origin || event.data?.type !== "PLAYER_COMMAND" || !player) {
          return;
        }

        const { action } = event.data;

        if (action === "play") {
          player.playVideo();
          postStatus("Video đang phát.");
          return;
        }

        if (action === "pause") {
          player.pauseVideo();
          postStatus("Video đã tạm dừng.");
          return;
        }

        if (action === "speed-1") {
          player.setPlaybackRate(1);
          postStatus("Tốc độ video đã chuyển về 1x.");
          return;
        }

        if (action === "speed-2") {
          player.setPlaybackRate(2);
          postStatus("Tốc độ video đã chuyển sang 2x.");
          return;
        }

        if (action === "fullscreen") {
          applySize(screen.availWidth, screen.availHeight);
          if (document.fullscreenElement) {
            await document.exitFullscreen();
          }
          await iframe.requestFullscreen?.();
          postStatus("Video đã được phóng to.");
          return;
        }

        if (action === "shrink") {
          if (document.fullscreenElement) {
            await document.exitFullscreen();
          }
          applySize(960, 640);
          postStatus("Player đã được thu nhỏ lại.");
        }
      });

      const script = document.createElement("script");
      script.src = "https://www.youtube.com/iframe_api";
      document.body.appendChild(script);
    </script>
  </body>
</html>
